name: Deploy a Cloud Run

# CI/CD: en cada push a main construye la imagen, la sube a Artifact Registry y
# deploya a Cloud Run. Autentica con Workload Identity Federation (sin llaves
# JSON de larga vida). Config vía Variables y Secrets del repo — ver
# docs/DEPLOY-GCP.md.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Un deploy a la vez; si llegan pushes seguidos, corre el último.
concurrency:
  group: deploy-cloudrun
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # necesario para Workload Identity Federation

    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/app:${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.CI_SERVICE_ACCOUNT }}
          token_format: access_token # para autenticar el docker push a AR

      - uses: google-github-actions/setup-gcloud@v2

      # Build en el propio runner y push a Artifact Registry. Evitamos
      # `gcloud builds submit` (Cloud Build) porque con builds regionales devuelve
      # error aunque el build sea EXITOSO (no puede leer el bucket de logs
      # administrado por Google). Docker en el runner es más directo y confiable.
      - name: Login a Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build & push imagen
        run: |
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy a Cloud Run
        env:
          IMAGE: ${{ env.IMAGE }}
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION }}
          SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
          BUCKET_DATA: ${{ vars.BUCKET_DATA }}
          BUCKET_UPLOADS: ${{ vars.BUCKET_UPLOADS }}
          RUNTIME_SA_EMAIL: ${{ vars.RUNTIME_SA_EMAIL }}
          # Opcional: nombre del secreto con el token central de Claude.
          SHARED_CLAUDE_SECRET: ${{ vars.SHARED_CLAUDE_SECRET }}
        run: bash deploy/cloudrun-deploy.sh
