<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#F6F5F0;font-family:'Inter',sans-serif;color:#15142B}
/* Profundidad: bloque navy angular arriba-derecha + glow lima. Nada rompe el fondo claro. */
.glow{position:absolute;top:-180px;right:-180px;width:720px;height:720px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%, rgba(235,255,111,.55), rgba(235,255,111,0) 66%)}
.blob{position:absolute;bottom:-240px;left:-220px;width:640px;height:640px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%, rgba(255,121,26,.16), rgba(255,121,26,0) 64%)}
.logo{position:absolute;top:66px;left:70px;height:40px;width:auto}
.idx{position:absolute;top:70px;right:74px;font-size:34px;font-weight:800;color:#FF791A}
.kicker{position:absolute;top:172px;left:72px;font-size:23px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:#FF791A;display:flex;align-items:center;gap:18px}
.kicker::before{content:'';width:52px;height:4px;background:#EBFF6F;display:inline-block}
.lead{position:absolute;top:240px;left:72px;right:150px;font-size:52px;font-weight:800;line-height:1.06;letter-spacing:-1.5px;color:#15142B}
.num{position:absolute;top:400px;left:60px;font-weight:900;font-size:440px;line-height:.82;color:#15142B;letter-spacing:-14px}
.num .x{color:#15142B;position:relative}
.num .x::after{content:'';position:absolute;left:6px;right:6px;bottom:52px;height:34px;background:#EBFF6F;z-index:-1;transform:skewX(-6deg)}
.bar{position:absolute;top:892px;left:76px;width:360px;height:16px;border-radius:8px;background:#15142B}
.body{position:absolute;top:950px;left:74px;right:150px;font-size:33px;line-height:1.42;font-weight:500;color:#38364a}
.body b{font-weight:800;color:#15142B}
.src{position:absolute;bottom:150px;left:76px;right:120px;font-size:22px;font-weight:700;color:#8b8896;display:flex;align-items:center;gap:16px}
.src::before{content:'';width:40px;height:3px;background:#FF791A;display:inline-block}
.sign{position:absolute;bottom:78px;left:74px;font-size:32px;font-weight:800;color:#15142B}
</style></head><body>
<div class="s">
  <div class="glow"></div>
  <div class="blob"></div>
  <img class="logo" src="/uploads/brand/30x-negro.png" alt="30X">
  <div class="idx">02</div>
  <div class="kicker">El número que incomoda</div>
  <div class="lead">No es capital. No es suerte.<br>Es la escala a la que decidís jugar:</div>
  <div class="num">30<span class="x">X</span></div>
  <div class="bar"></div>
  <div class="body">Tu empresa rara vez crece más que tu ambición. <b>Subí el techo mental primero</b> y el resto se vuelve un problema de ejecución.</div>
  <div class="src">Mentalidad de founder · lectura de Andrés Bilbao</div>
  <div class="sign">/ Andrés Bilbao.</div>
</div>
</body></html>
