<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#15142B;font-family:'Inter',sans-serif}
/* Foto a sangre (FONDO - FOTO MENTOR). Respaldo navy detrás. */
.photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:52% 10%;background:#15142B}
/* Wash de identidad Andrés: navy denso desde la IZQUIERDA (tapa la columna de la foto)
   + piso navy para el titular + glow lima sutil arriba-derecha (firma 30X). */
.wash{position:absolute;inset:0;background:
  radial-gradient(52% 40% at 88% 12%, rgba(235,255,111,.20), rgba(235,255,111,0) 60%),
  linear-gradient(100deg, rgba(13,12,30,.98) 0%, rgba(15,20,43,.94) 30%, rgba(21,20,43,.55) 47%, rgba(21,20,43,.10) 62%, rgba(21,20,43,0) 74%),
  linear-gradient(0deg, rgba(13,12,30,.97) 2%, rgba(13,12,30,.55) 30%, rgba(13,12,30,0) 56%)}
.grain{position:absolute;inset:0;opacity:.05;background-image:radial-gradient(#EBFF6F 1px,transparent 1px);background-size:5px 5px;mix-blend-mode:overlay}
.logo{position:absolute;top:64px;left:64px;height:44px;width:auto}
.idx{position:absolute;top:66px;right:70px;font-size:34px;font-weight:800;color:#EBFF6F;letter-spacing:1px}
.kicker{position:absolute;left:72px;top:250px;right:300px;font-size:21px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:#EBFF6F;line-height:1.6;display:flex;align-items:center;gap:16px}
.kicker::before{content:'';width:46px;height:4px;background:#FF791A;flex:0 0 auto}
.title{position:absolute;left:70px;right:210px;top:520px;font-weight:900;font-size:112px;line-height:.94;letter-spacing:-3px;color:#F6F5F0;text-shadow:0 6px 44px rgba(0,0,0,.6)}
.title .em{color:#EBFF6F}
.sub{position:absolute;left:74px;right:330px;top:1010px;font-size:29px;font-weight:500;line-height:1.36;color:#D9D7E6}
.sub b{font-weight:800;color:#F6F5F0}
.foot{position:absolute;left:74px;bottom:150px;display:flex;align-items:center;gap:18px}
.foot .dot{width:15px;height:15px;border-radius:50%;background:#EBFF6F}
.sign{font-size:34px;font-weight:800;letter-spacing:.5px;color:#F6F5F0}
.swipe{position:absolute;left:74px;bottom:82px;font-size:21px;font-weight:800;letter-spacing:3px;color:#EBFF6F;text-transform:uppercase}
</style></head><body>
<div class="s">
  <img class="photo" src="/uploads/30x/andres/hero.jpg" alt="">
  <div class="wash"></div>
  <div class="grain"></div>
  <img class="logo" src="/uploads/brand/30x-blanco.png" alt="30X">
  <div class="idx">01</div>
  <div class="kicker">Co-founder Rappi · Co-founder 30X · Inversionista</div>
  <div class="title">Construí como<br>si LatAm<br><span class="em">no tuviera<br>techo.</span></div>
  <div class="sub">Cinco reglas para construir del tamaño de tu <b>ambición</b>, no del tamaño de tu miedo.</div>
  <div class="foot"><span class="dot"></span><span class="sign">Con Andrés Bilbao</span></div>
  <div class="swipe">Desliza →</div>
</div>
</body></html>
