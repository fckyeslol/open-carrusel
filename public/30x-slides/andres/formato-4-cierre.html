<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#F6F5F0;font-family:'Inter',sans-serif;color:#15142B}
.glow{position:absolute;bottom:-260px;left:50%;transform:translateX(-50%);width:1000px;height:720px;
  background:radial-gradient(circle at 50% 100%, rgba(235,255,111,.6), rgba(235,255,111,0) 68%)}
.blob{position:absolute;top:-160px;right:-160px;width:560px;height:560px;
  background:radial-gradient(circle at 50% 50%, rgba(255,121,26,.14), rgba(255,121,26,0) 66%)}
.logo{position:absolute;top:66px;left:70px;height:40px;width:auto}
.idx{position:absolute;top:70px;right:74px;font-size:34px;font-weight:800;color:#FF791A}
.medallion{position:absolute;top:150px;left:50%;transform:translateX(-50%);width:244px;height:244px;border-radius:50%;overflow:hidden;border:6px solid #EBFF6F;box-shadow:0 22px 54px rgba(21,20,43,.28)}
.medallion img{width:100%;height:100%;object-fit:cover;object-position:50% 24%;background:#e7e5dd}
.kicker{position:absolute;top:436px;left:0;right:0;text-align:center;font-size:22px;font-weight:800;letter-spacing:5px;text-transform:uppercase;color:#FF791A}
.remate{position:absolute;top:498px;left:80px;right:80px;text-align:center;font-weight:900;font-size:74px;line-height:1.04;letter-spacing:-2px;color:#15142B}
.remate .em{color:#FF791A}
.cta{position:absolute;top:838px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:14px;
  background:#15142B;color:#F6F5F0;font-size:29px;font-weight:800;padding:24px 52px;border-radius:60px;white-space:nowrap;box-shadow:0 16px 40px rgba(21,20,43,.24)}
.cta .arrow{color:#EBFF6F}
.sign{position:absolute;bottom:150px;left:0;right:0;text-align:center;font-size:48px;font-weight:900;letter-spacing:-1px;color:#15142B}
.handle{position:absolute;bottom:96px;left:0;right:0;text-align:center;font-size:23px;font-weight:600;letter-spacing:1px;color:#8b8896}
</style></head><body>
<div class="s">
  <div class="glow"></div>
  <div class="blob"></div>
  <img class="logo" src="/uploads/brand/30x-negro.png" alt="30X">
  <div class="idx">04</div>
  <div class="medallion"><img src="/uploads/30x/andres/face.jpg" alt=""></div>
  <div class="kicker">Tu próxima jugada</div>
  <div class="remate">No preguntes si<br>es posible.<br><span class="em">Preguntá qué tan grande.</span></div>
  <div class="cta">Seguí a Andrés y guardá esto <span class="arrow">&rarr;</span></div>
  <div class="sign">Andrés Bilbao.</div>
  <div class="handle">30X · Executive Education</div>
</div>
</body></html>
