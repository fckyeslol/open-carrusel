<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#160E2B;font-family:'Inter',sans-serif}
/* Textura de foto muy tenue detrás + wash morado + glow cian central */
.tex{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 12%;opacity:.16;filter:grayscale(.25)}
.wash{position:absolute;inset:0;background:
  radial-gradient(58% 44% at 50% 38%, rgba(21,134,142,.22), rgba(21,134,142,0) 62%),
  linear-gradient(180deg, rgba(22,14,43,.88), rgba(22,14,43,.74) 45%, rgba(22,14,43,.96))}
.logo{position:absolute;top:66px;left:70px;height:40px;width:auto;filter:brightness(0) invert(1)}
.idx{position:absolute;top:74px;right:74px;font-family:'Playfair Display',serif;font-size:40px;color:#4CBCC4}
.mark{position:absolute;top:198px;left:0;right:0;text-align:center;font-family:'Playfair Display',serif;font-weight:700;font-size:290px;line-height:.6;color:#4CBCC4;opacity:.9}
.quote{position:absolute;top:466px;left:92px;right:92px;text-align:center;font-family:'Playfair Display',serif;font-weight:500;font-size:76px;line-height:1.18;color:#F6F5F0;letter-spacing:-.5px}
.quote .em{font-style:italic;font-weight:600;color:#4CBCC4}
.divider{position:absolute;top:970px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:20px}
.divider .line{width:120px;height:2px;background:rgba(246,245,240,.32)}
.divider .dot{width:12px;height:12px;transform:rotate(45deg);background:#15868E}
.name{position:absolute;top:1052px;left:0;right:0;text-align:center;font-size:32px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:#F6F5F0}
.role{position:absolute;top:1110px;left:0;right:0;text-align:center;font-size:23px;font-weight:500;color:#B9B2CF}
</style></head><body>
<div class="s">
  <img class="tex" src="/uploads/30x/alejandra-deik/hero.jpg" alt="">
  <div class="wash"></div>
  <img class="logo" src="/uploads/brand/30x-blanco.png" alt="30X">
  <div class="idx">03</div>
  <div class="mark">&ldquo;</div>
  <div class="quote">Cerré una empresa y aprendí más de márgenes<br>que en <span class="em">cinco años creciendo.</span></div>
  <div class="divider"><span class="line"></span><span class="dot"></span><span class="line"></span></div>
  <div class="name">Alejandra Deik</div>
  <div class="role">Ex Manager B2B Frubana · Pricing &amp; Operaciones</div>
</div>
</body></html>
