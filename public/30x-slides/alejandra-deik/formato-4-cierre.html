<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#F6F5F0;font-family:'Inter',sans-serif;color:#1B1233}
.glow{position:absolute;bottom:-260px;left:50%;transform:translateX(-50%);width:1000px;height:720px;
  background:radial-gradient(circle at 50% 100%, rgba(21,134,142,.42), rgba(21,134,142,0) 68%)}
.logo{position:absolute;top:66px;left:70px;height:40px;width:auto}
.idx{position:absolute;top:74px;right:74px;font-family:'Playfair Display',serif;font-size:40px;color:#15868E}
.medallion{position:absolute;top:150px;left:50%;transform:translateX(-50%);width:240px;height:240px;border-radius:50%;overflow:hidden;border:5px solid #15868E;box-shadow:0 20px 50px rgba(27,18,51,.22)}
.medallion img{width:100%;height:100%;object-fit:cover;object-position:50% 32%;background:#e2ddec}
.kicker{position:absolute;top:430px;left:0;right:0;text-align:center;font-size:23px;font-weight:800;letter-spacing:5px;text-transform:uppercase;color:#15868E}
.remate{position:absolute;top:488px;left:90px;right:90px;text-align:center;font-family:'Playfair Display',serif;font-weight:500;font-size:78px;line-height:1.1;color:#1B1233;letter-spacing:-.5px}
.remate .em{font-style:italic;font-weight:600;color:#15868E}
.cta{position:absolute;top:838px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:14px;
  background:#1B1233;color:#F6F5F0;font-size:30px;font-weight:700;padding:24px 52px;border-radius:60px;white-space:nowrap;box-shadow:0 16px 40px rgba(27,18,51,.28)}
.cta .arrow{color:#4CBCC4}
.sign{position:absolute;bottom:150px;left:0;right:0;text-align:center;font-family:'Playfair Display',serif;font-style:italic;font-size:52px;color:#1B1233}
.handle{position:absolute;bottom:96px;left:0;right:0;text-align:center;font-size:24px;font-weight:600;letter-spacing:1px;color:#7c7690}
</style></head><body>
<div class="s">
  <div class="glow"></div>
  <img class="logo" src="/uploads/brand/30x-negro.png" alt="30X">
  <div class="idx">04</div>
  <div class="medallion"><img src="/uploads/30x/alejandra-deik/face.jpg" alt=""></div>
  <div class="kicker">Tu próxima decisión</div>
  <div class="remate">No defiendas tu precio.<br><span class="em">Defendé tu margen.</span></div>
  <div class="cta">Seguí a Alejandra y guardá esto <span class="arrow">→</span></div>
  <div class="sign">/ Alejandra Deik.</div>
  <div class="handle">30X · Executive Education</div>
</div>
</body></html>
