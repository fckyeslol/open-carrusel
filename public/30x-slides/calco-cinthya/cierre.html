<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#F4F3EE;color:#2A2320;font-family:'Instrument Serif',serif;padding:78px 70px 60px}
.paper{position:absolute;inset:0;opacity:.5;mix-blend-mode:multiply}
.wrap{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;align-items:center}
.blocks{display:flex;align-self:flex-start;margin-left:8px}
.blk{font-size:150px;line-height:1;font-weight:400;letter-spacing:1px;padding:6px 30px 18px}
.b1{background:#E5ACBF;color:#2A2320}
.b2{background:#2A2320;color:#F6F5F0}
.arrow{position:absolute;right:70px;top:290px;z-index:3}
.lead{text-align:center;font-size:58px;line-height:1.14;margin-top:44px;max-width:800px}
.card{margin-top:40px;width:660px;background:#F0EAEF;border:1.5px solid #e0cdd8;border-radius:26px;padding:34px 46px;text-align:center}
.bubble{display:flex;justify-content:center;margin-bottom:6px}
.cdiv{width:120px;height:2px;background:#c9a9b6;margin:6px auto 18px}
.card p{font-size:46px;line-height:1.18}
.card b{font-style:normal}
.close{margin-top:auto;text-align:center;font-size:62px;line-height:1.1;font-weight:400}
.em{font-style:italic;color:#C77E97}
</style></head><body>
<div class="s">
<svg class="paper" width="1080" height="1350"><filter id="pap"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.09"/></feComponentTransfer></filter><rect width="1080" height="1350" filter="url(#pap)"/></svg>
<div class="wrap">
  <div class="blocks"><span class="blk b1">COMENTA</span><span class="blk b2">IA</span></div>
  <svg class="arrow" width="150" height="230" viewBox="0 0 150 230" fill="none" stroke="#2A2320" stroke-width="5" stroke-linecap="round"><path d="M120 220C150 150 140 70 96 30"/><path d="M64 44l30-18 14 34"/></svg>
  <div class="lead">Si quieres convertir tu contenido en conversaciones y tus conversaciones en clientes, comenta IA.</div>
  <div class="card">
    <div class="bubble"><svg width="66" height="60" viewBox="0 0 66 60" fill="none" stroke="#C77E97" stroke-width="3.5"><path d="M8 8h50a4 4 0 0 1 4 4v28a4 4 0 0 1-4 4H30l-14 12v-12H8a4 4 0 0 1-4-4V12a4 4 0 0 1 4-4Z"/><circle cx="24" cy="26" r="2.5" fill="#C77E97" stroke="none"/><circle cx="33" cy="26" r="2.5" fill="#C77E97" stroke="none"/><circle cx="42" cy="26" r="2.5" fill="#C77E97" stroke="none"/></svg></div>
    <div class="cdiv"></div>
    <p>Te enseño a usar <b>IA</b> para crear contenido con <b>intención</b>, mejorar tu oferta y vender sin improvisar.</p>
  </div>
  <div class="close">No necesitas publicar más.<br><span class="em">Necesitas convertir mejor.</span></div>
</div>
</div>
</body></html>
