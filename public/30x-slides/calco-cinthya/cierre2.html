<!DOCTYPE html><html><head><meta charset="utf-8"><link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Inter:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#F4F3EE;color:#2A2320;font-family:'Instrument Serif',serif;padding:78px 70px 60px}
.paper{position:absolute;inset:0;opacity:.5;mix-blend-mode:multiply}
.wrap{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;align-items:center}
.blocks{display:flex;align-self:flex-start;margin-left:8px}
.blk{font-size:146px;line-height:1;letter-spacing:1px;padding:6px 30px 18px}
.b1{background:#E5ACBF;color:#241E1B}.b2{background:#2A2320;color:#F4F3EE}
.arrow{position:absolute;right:34px;top:262px;z-index:3}
.lead{text-align:center;font-size:56px;line-height:1.16;margin-top:50px;max-width:640px}
.card{margin-top:52px;width:680px;background:#f8f0f3;border:1.5px solid #e9cbd5;border-radius:26px;padding:38px 50px;text-align:center}
.bubble{display:flex;justify-content:center;margin-bottom:6px}
.cdiv{width:120px;height:2px;background:#d8a5b6;margin:6px auto 18px}
.card p{font-size:48px;line-height:1.2}
.close{margin-top:70px;margin-bottom:auto;text-align:center;font-size:70px;line-height:1.08}
.em{font-style:italic;color:#b06f85}
</style></head><body><div class="s"><svg class="paper" width="1080" height="1350"><filter id="pap"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.09"/></feComponentTransfer></filter><rect width="1080" height="1350" filter="url(#pap)"/></svg><div class="wrap">
<div class="blocks"><span class="blk b1">COMENTA</span><span class="blk b2">IA</span></div>
<svg class="arrow" width="120" height="250" viewBox="0 0 120 250" fill="none" stroke="#2A2320" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><path d="M92 244C116 168 104 74 54 26"/><path d="M26 40l26-16 14 30"/></svg>
<div class="lead">Si quieres convertir tu contenido en conversaciones y tus conversaciones en clientes, comenta IA.</div>
<div class="card"><div class="bubble"><svg width="66" height="60" viewBox="0 0 66 60" fill="none" stroke="#b06f85" stroke-width="3.5"><path d="M8 8h50a4 4 0 0 1 4 4v28a4 4 0 0 1-4 4H30l-14 12v-12H8a4 4 0 0 1-4-4V12a4 4 0 0 1 4-4Z"/><circle cx="24" cy="26" r="2.5" fill="#b06f85" stroke="none"/><circle cx="33" cy="26" r="2.5" fill="#b06f85" stroke="none"/><circle cx="42" cy="26" r="2.5" fill="#b06f85" stroke="none"/></svg></div><div class="cdiv"></div>
<p>Te enseño a usar <b>IA</b> para crear contenido con <b>intención</b>, mejorar tu oferta y vender sin improvisar.</p></div>
<div class="close">No necesitas publicar más.<br><span class="em">Necesitas convertir mejor.</span></div>
</div></div></body></html>
