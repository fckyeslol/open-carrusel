<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#1E010B;font-family:'Inter',sans-serif}
/* Textura de foto muy tenue detrás + wash ciruela + glow rojo central */
.tex{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:60% 40%;opacity:.16;filter:grayscale(.25)}
.wash{position:absolute;inset:0;background:
  radial-gradient(58% 44% at 50% 40%, rgba(249,36,36,.20), rgba(249,36,36,0) 62%),
  linear-gradient(180deg, rgba(30,1,11,.88), rgba(30,1,11,.74) 45%, rgba(30,1,11,.95))}
.logo{position:absolute;top:66px;left:70px;height:40px;width:auto;filter:brightness(0) invert(1)}
.idx{position:absolute;top:66px;right:74px;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:38px;color:#F92424}
.mark{position:absolute;top:196px;left:0;right:0;text-align:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:300px;line-height:.6;color:#F92424;opacity:.92}
.quote{position:absolute;top:472px;left:88px;right:88px;text-align:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:80px;line-height:1.1;letter-spacing:-1.5px;color:#F6F5F0}
.quote .em{color:#F92424}
.divider{position:absolute;top:958px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:20px}
.divider .line{width:120px;height:2px;background:rgba(217,203,178,.4)}
.divider .dot{width:12px;height:12px;transform:rotate(45deg);background:#F92424}
.name{position:absolute;top:1044px;left:0;right:0;text-align:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:36px;letter-spacing:1px;color:#F6F5F0}
.role{position:absolute;top:1104px;left:0;right:0;text-align:center;font-size:23px;font-weight:600;letter-spacing:.5px;color:#D9CBB2}
</style></head><body>
<div class="s">
  <img class="tex" src="/uploads/30x/dylan-rosemberg/hero.jpg" alt="">
  <div class="wash"></div>
  <img class="logo" src="/uploads/brand/30x-blanco.png" alt="30X">
  <div class="idx">03</div>
  <div class="mark">&ldquo;</div>
  <div class="quote">No escales lo que no medís.<br><span class="em">Medí lo que querés escalar.</span></div>
  <div class="divider"><span class="line"></span><span class="dot"></span><span class="line"></span></div>
  <div class="name">Dylan Rosemberg</div>
  <div class="role">Founder @Growthrockstar · Co-founder Crece30X</div>
</div>
</body></html>
