<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#F6F5F0;font-family:'Inter',sans-serif;color:#1E010B}
.glow{position:absolute;bottom:-260px;left:50%;transform:translateX(-50%);width:1000px;height:720px;
  background:radial-gradient(circle at 50% 100%, rgba(249,36,36,.34), rgba(249,36,36,0) 68%)}
.blob{position:absolute;top:-160px;left:-180px;width:560px;height:560px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%, rgba(217,203,178,.5), rgba(217,203,178,0) 66%)}
.logo{position:absolute;top:66px;left:70px;height:40px;width:auto}
.idx{position:absolute;top:66px;right:74px;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:38px;color:#F92424}
.medallion{position:absolute;top:150px;left:50%;transform:translateX(-50%);width:240px;height:240px;border-radius:50%;overflow:hidden;border:5px solid #F92424;box-shadow:0 20px 50px rgba(30,1,11,.28)}
.medallion img{width:100%;height:100%;object-fit:cover;object-position:52% 45%;background:#e7ddd2}
.kicker{position:absolute;top:430px;left:0;right:0;text-align:center;font-size:23px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:#F92424}
.remate{position:absolute;top:486px;left:84px;right:84px;text-align:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:76px;line-height:1.06;letter-spacing:-1.5px;color:#1E010B}
.remate .em{color:#F92424}
.cta{position:absolute;top:838px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:14px;
  background:#1E010B;color:#F6F5F0;font-size:30px;font-weight:700;padding:24px 52px;border-radius:60px;white-space:nowrap}
.cta .arrow{color:#F92424}
.sign{position:absolute;bottom:150px;left:0;right:0;text-align:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:50px;color:#1E010B}
.handle{position:absolute;bottom:96px;left:0;right:0;text-align:center;font-size:24px;font-weight:600;letter-spacing:1px;color:#8a7a70}
</style></head><body>
<div class="s">
  <div class="glow"></div>
  <div class="blob"></div>
  <img class="logo" src="/uploads/brand/30x-negro.png" alt="30X">
  <div class="idx">04</div>
  <div class="medallion"><img src="/uploads/30x/dylan-rosemberg/face.jpg" alt=""></div>
  <div class="kicker">Tu próximo experimento</div>
  <div class="remate">No preguntes cuánto<br>invertir en growth.<br><span class="em">Preguntá qué vas a medir.</span></div>
  <div class="cta">Seguí a Dylan y guardá esto <span class="arrow">→</span></div>
  <div class="sign">/ Dylan Rosemberg.</div>
  <div class="handle">30X · Executive Education</div>
</div>
</body></html>
