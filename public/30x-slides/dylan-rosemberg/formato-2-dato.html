<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#F6F5F0;font-family:'Inter',sans-serif;color:#1E010B}
/* Profundidad: glow rojo arriba-derecha + halo crema sangrando abajo-izq */
.glow{position:absolute;top:-180px;right:-180px;width:760px;height:760px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%, rgba(249,36,36,.30), rgba(249,36,36,0) 66%)}
.blob{position:absolute;bottom:-260px;left:-240px;width:680px;height:680px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%, rgba(217,203,178,.55), rgba(217,203,178,0) 64%)}
.logo{position:absolute;top:66px;left:70px;height:40px;width:auto}
.idx{position:absolute;top:66px;right:74px;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:38px;color:#F92424}
.kicker{position:absolute;top:172px;left:72px;font-size:24px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:#F92424;display:flex;align-items:center;gap:18px}
.kicker::before{content:'';width:52px;height:4px;background:#F92424;display:inline-block}
.lead{position:absolute;top:238px;left:70px;right:120px;font-family:'Bricolage Grotesque',sans-serif;font-weight:500;font-size:52px;line-height:1.1;color:#1E010B}
.num{position:absolute;top:398px;left:46px;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:500px;line-height:.8;color:#1E010B;letter-spacing:-14px}
.num .pct{color:#F92424;font-size:300px;vertical-align:baseline}
.bar{position:absolute;top:908px;left:74px;width:380px;height:14px;border-radius:7px;background:#F92424}
.body{position:absolute;top:966px;left:72px;right:150px;font-size:34px;line-height:1.4;font-weight:500;color:#3a2a2f}
.body b{font-weight:800;color:#1E010B}
.src{position:absolute;bottom:150px;left:74px;right:120px;font-size:23px;font-weight:600;color:#8a7a70;display:flex;align-items:center;gap:16px}
.src::before{content:'';width:40px;height:3px;background:#F92424;display:inline-block}
.sign{position:absolute;bottom:78px;left:72px;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:34px;color:#1E010B}
</style></head><body>
<div class="s">
  <div class="glow"></div>
  <div class="blob"></div>
  <img class="logo" src="/uploads/brand/30x-negro.png" alt="30X">
  <div class="idx">02</div>
  <div class="kicker">El número que ignoran</div>
  <div class="lead">De cada peso que ponés en ads,<br>esto se va sin volver:</div>
  <div class="num">70<span class="pct">%</span></div>
  <div class="bar"></div>
  <div class="body">No es que el canal no sirva. Es que <b>nadie corre el experimento</b> antes de escalar el gasto.</div>
  <div class="src">Benchmark de growth · lectura de Dylan Rosemberg</div>
  <div class="sign">/ Dylan Rosemberg.</div>
</div>
</body></html>
