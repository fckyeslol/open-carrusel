<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#241E1B;font-family:'Inter',sans-serif}
/* Textura de foto muy tenue detrás + wash tierra + glow blush central */
.tex{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.14;filter:grayscale(.3)}
.wash{position:absolute;inset:0;background:
  radial-gradient(60% 45% at 50% 40%, rgba(229,172,191,.24), rgba(229,172,191,0) 62%),
  linear-gradient(180deg, rgba(36,30,27,.86), rgba(36,30,27,.72) 45%, rgba(36,30,27,.94))}
.logo{position:absolute;top:66px;left:70px;height:40px;width:auto;filter:brightness(0) invert(1)}
.idx{position:absolute;top:74px;right:74px;font-family:'Instrument Serif',serif;font-size:38px;color:#E5ACBF}
.mark{position:absolute;top:200px;left:0;right:0;text-align:center;font-family:'Instrument Serif',serif;font-size:280px;line-height:.6;color:#E5ACBF;opacity:.9}
.quote{position:absolute;top:480px;left:96px;right:96px;text-align:center;font-family:'Instrument Serif',serif;font-size:82px;line-height:1.16;color:#F6F5F0}
.quote .em{font-style:italic;color:#E5ACBF}
.divider{position:absolute;top:965px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:20px}
.divider .line{width:120px;height:2px;background:rgba(246,245,240,.35)}
.divider .dot{width:12px;height:12px;transform:rotate(45deg);background:#E5ACBF}
.name{position:absolute;top:1050px;left:0;right:0;text-align:center;font-size:32px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:#F6F5F0}
.role{position:absolute;top:1108px;left:0;right:0;text-align:center;font-size:24px;font-weight:500;color:#C9B8B0}
</style></head><body>
<div class="s">
  <img class="tex" src="/uploads/30x/mentor-placeholder.jpg" alt="">
  <div class="wash"></div>
  <img class="logo" src="/uploads/brand/30x-blanco.png" alt="30X">
  <div class="idx">03</div>
  <div class="mark">&ldquo;</div>
  <div class="quote">La ventaja no es tener la mejor IA.<br>Es hacer <span class="em">las mejores preguntas.</span></div>
  <div class="divider"><span class="line"></span><span class="dot"></span><span class="line"></span></div>
  <div class="name">Cinthya Sánchez</div>
  <div class="role">CIO · Ex-Microsoft · Sensei de IA · Board member</div>
</div>
</body></html>
