<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#F6F5F0;font-family:'Inter',sans-serif;color:#2A2320}
/* blush wash rising from the bottom */
.ov{position:absolute;inset:0;background:
 radial-gradient(90% 55% at 50% 118%,rgba(229,172,191,.5),rgba(246,245,240,0) 60%),
 radial-gradient(60% 40% at 84% 8%,rgba(229,172,191,.22),rgba(246,245,240,0) 70%)}
/* portrait as a circular medallion, blush ring */
.avatar{position:absolute;top:150px;left:50%;transform:translateX(-50%);width:236px;height:236px;border-radius:50%;
 background:#2A2320 url('/uploads/persons/cinthya/1.jpg') center 16%/cover no-repeat;
 box-shadow:0 0 0 6px #F6F5F0,0 0 0 12px #E5ACBF,0 22px 50px rgba(42,35,32,.28)}
.kicker{position:absolute;top:432px;left:0;right:0;text-align:center;font-size:21px;font-weight:600;letter-spacing:5px;text-transform:uppercase;color:#8a7d73}
.remate{position:absolute;top:478px;left:100px;right:100px;text-align:center;font-family:'Instrument Serif',serif;font-weight:400;font-size:92px;line-height:1.02;letter-spacing:-1px;color:#2A2320}
.remate em{font-style:italic;color:#C77E97}
/* soft CTA pill */
.cta{position:absolute;top:772px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:20px;
 background:#2A2320;color:#F6F5F0;padding:26px 52px;border-radius:60px;box-shadow:0 18px 40px rgba(42,35,32,.3)}
.cta .ic{width:40px;height:40px;border-radius:50%;background:#E5ACBF;color:#2A2320;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700}
.cta .t{font-size:30px;font-weight:600;letter-spacing:.4px}
.cta .t b{color:#E5ACBF;font-weight:700}
/* divider */
.div{position:absolute;top:924px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:22px}
.div .ln{width:110px;height:2px;background:rgba(42,35,32,.18)}
.div .dm{width:11px;height:11px;background:#E5ACBF;transform:rotate(45deg)}
.sign{position:absolute;top:986px;left:0;right:0;text-align:center;font-family:'Instrument Serif',serif;font-style:italic;font-size:62px;color:#2A2320}
.handle{position:absolute;top:1082px;left:0;right:0;text-align:center;font-size:24px;letter-spacing:2px;color:#8a7d73;font-weight:500}
.logo{position:absolute;bottom:66px;left:0;right:0;margin:0 auto;display:block;width:118px;height:auto;opacity:.9}
</style></head><body>
<div class="s">
 <div class="ov"></div>
 <div class="avatar"></div>
 <div class="kicker">Antes de cerrar</div>
 <div class="remate">Dirige la IA.<br><em>No la persigas.</em></div>
 <div class="cta"><span class="ic">&#9733;</span><span class="t">Sígueme y <b>guarda</b> este carrusel</span></div>
 <div class="div"><span class="ln"></span><span class="dm"></span><span class="ln"></span></div>
 <div class="sign">/ Cinthya Sánchez.</div>
 <div class="handle">CIO · EX-MICROSOFT · SENSEI DE IA · BOARD MEMBER</div>
 <img class="logo" src="/uploads/30x-logo.png" alt="30X">
</div></body></html>
