<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#F6F5F0;font-family:'Inter',sans-serif;color:#2A2320}
.glow{position:absolute;bottom:-260px;left:50%;transform:translateX(-50%);width:1000px;height:720px;
  background:radial-gradient(circle at 50% 100%, rgba(229,172,191,.6), rgba(229,172,191,0) 68%)}
.logo{position:absolute;top:66px;left:70px;height:40px;width:auto}
.idx{position:absolute;top:74px;right:74px;font-family:'Instrument Serif',serif;font-size:38px;color:#C77E97}
.medallion{position:absolute;top:150px;left:50%;transform:translateX(-50%);width:240px;height:240px;border-radius:50%;overflow:hidden;border:5px solid #E5ACBF;box-shadow:0 20px 50px rgba(42,35,32,.22)}
.medallion img{width:100%;height:100%;object-fit:cover;object-position:50% 30%;background:#e7ddd9}
.kicker{position:absolute;top:430px;left:0;right:0;text-align:center;font-size:23px;font-weight:800;letter-spacing:5px;text-transform:uppercase;color:#C77E97}
.remate{position:absolute;top:490px;left:90px;right:90px;text-align:center;font-family:'Instrument Serif',serif;font-size:78px;line-height:1.08;color:#2A2320}
.remate .em{font-style:italic;color:#C77E97}
.cta{position:absolute;top:830px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:14px;
  background:#2A2320;color:#F6F5F0;font-size:30px;font-weight:700;padding:24px 52px;border-radius:60px;white-space:nowrap}
.cta .arrow{color:#E5ACBF}
.sign{position:absolute;bottom:150px;left:0;right:0;text-align:center;font-family:'Instrument Serif',serif;font-style:italic;font-size:52px;color:#2A2320}
.handle{position:absolute;bottom:96px;left:0;right:0;text-align:center;font-size:24px;font-weight:600;letter-spacing:1px;color:#8a7d76}
</style></head><body>
<div class="s">
  <div class="glow"></div>
  <img class="logo" src="/uploads/brand/30x-negro.png" alt="30X">
  <div class="idx">04</div>
  <div class="medallion"><img src="/uploads/30x/cinthya/cinthya-face.jpg" alt=""></div>
  <div class="kicker">Tu próxima decisión</div>
  <div class="remate">No preguntes si la IA<br>te va a reemplazar.<br><span class="em">Preguntá qué le vas a delegar.</span></div>
  <div class="cta">Seguí a Cinthya y guardá esto <span class="arrow">→</span></div>
  <div class="sign">/ Cinthya Sánchez.</div>
  <div class="handle">30X · Executive Education</div>
</div>
</body></html>
