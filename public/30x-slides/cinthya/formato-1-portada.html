<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#2A2320;font-family:'Inter',sans-serif}
/* Foto a sangre (FONDO 3 - FOTO MENTOR). Slot editable; detrás un tierra de respaldo. */
.photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:70% 30%;background:#2A2320}
/* Wash de identidad Cinthya: tierra denso abajo/izq → transparente, + glow blush arriba/der. */
.wash{position:absolute;inset:0;background:
  radial-gradient(70% 55% at 82% 20%, rgba(229,172,191,.42), rgba(229,172,191,0) 60%),
  linear-gradient(115deg, rgba(42,35,32,.92) 8%, rgba(42,35,32,.55) 46%, rgba(42,35,32,.28) 74%),
  linear-gradient(0deg, rgba(42,35,32,.96) 2%, rgba(42,35,32,.35) 34%, rgba(42,35,32,0) 62%)}
/* Grano/atmósfera sutil */
.grain{position:absolute;inset:0;opacity:.06;background-image:radial-gradient(#F6F5F0 1px,transparent 1px);background-size:4px 4px;mix-blend-mode:overlay}
.logo{position:absolute;top:64px;left:64px;height:44px;width:auto;filter:brightness(0) invert(1)}
.idx{position:absolute;top:70px;right:70px;font-family:'Instrument Serif',serif;font-size:40px;color:#F6F5F0;opacity:.7}
.kicker{position:absolute;left:70px;top:250px;right:120px;font-size:23px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:#E5ACBF;line-height:1.5}
.kicker b{color:#F6F5F0;font-weight:800}
.title{position:absolute;left:66px;right:80px;top:470px;font-family:'Instrument Serif',serif;font-weight:400;font-size:150px;line-height:.92;color:#F6F5F0;text-shadow:0 6px 40px rgba(0,0,0,.5)}
.title .em{font-style:italic;color:#E5ACBF}
.sub{position:absolute;left:70px;right:150px;top:1040px;font-size:30px;font-weight:500;line-height:1.35;color:#EAE4E0}
.sub b{font-weight:700;color:#F6F5F0}
.foot{position:absolute;left:70px;bottom:150px;display:flex;align-items:center;gap:18px}
.foot .dot{width:14px;height:14px;border-radius:50%;background:#E5ACBF}
.sign{font-family:'Instrument Serif',serif;font-style:italic;font-size:40px;color:#F6F5F0}
.swipe{position:absolute;left:70px;bottom:80px;font-size:22px;font-weight:700;letter-spacing:3px;color:#E5ACBF;text-transform:uppercase}
</style></head><body>
<div class="s">
  <img class="photo" src="/uploads/30x/mentor-placeholder.jpg" alt="">
  <div class="wash"></div>
  <div class="grain"></div>
  <img class="logo" src="/uploads/brand/30x-blanco.png" alt="30X">
  <div class="idx">01</div>
  <div class="kicker">CIO · Ex-Microsoft · <b>Sensei de IA</b> · Board member</div>
  <div class="title">La IA no<br>te reemplaza.<br><span class="em">Te delega.</span></div>
  <div class="sub">Cinco decisiones que separan a quien <b>usa</b> la inteligencia artificial de quien la <b>dirige</b>.</div>
  <div class="foot"><span class="dot"></span><span class="sign">Con Cinthya Sánchez</span></div>
  <div class="swipe">Desliza →</div>
</div>
</body></html>
