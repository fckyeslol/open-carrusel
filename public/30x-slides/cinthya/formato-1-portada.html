<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#F6F5F0;font-family:'Inter',sans-serif;color:#2A2320}
/* photo, right column, bleeding off the edge */
.photo{position:absolute;top:0;right:0;width:560px;height:1350px;background:#2A2320 url('/uploads/persons/cinthya/1.jpg') center 18%/cover no-repeat;
 -webkit-mask:linear-gradient(90deg,transparent,#000 22%);mask:linear-gradient(90deg,transparent,#000 22%);filter:drop-shadow(-18px 0 40px rgba(42,35,32,.28))}
/* warm atmospheric wash over everything */
.ov{position:absolute;inset:0;background:
 radial-gradient(70% 55% at 14% 30%,rgba(246,245,240,.0),rgba(246,245,240,.55) 70%),
 linear-gradient(90deg,#F6F5F0 30%,rgba(246,245,240,.75) 46%,rgba(246,245,240,0) 60%)}
/* blush accent field top-left */
.blush{position:absolute;top:-160px;left:-160px;width:620px;height:620px;border-radius:50%;
 background:radial-gradient(circle,rgba(229,172,191,.55),rgba(229,172,191,0) 68%);pointer-events:none}
.logo{position:absolute;top:64px;left:88px;width:112px;height:auto;opacity:.9}
.kicker{position:absolute;top:250px;left:88px;width:640px;font-size:22px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:#2A2320}
.kicker b{color:#C77E97;font-weight:700}
.kicker .rule{display:inline-block;width:56px;height:2px;background:#E5ACBF;vertical-align:middle;margin-right:18px;margin-bottom:5px}
.title{position:absolute;top:322px;left:82px;width:640px;font-family:'Instrument Serif',serif;font-weight:400;font-size:158px;line-height:.9;letter-spacing:-2px;color:#2A2320}
.title em{font-style:italic;color:#C77E97;display:block}
.sub{position:absolute;top:872px;left:90px;width:560px;font-size:29px;line-height:1.5;color:#4a4038;font-weight:400}
.sub b{font-weight:600;color:#2A2320}
.tagline{position:absolute;bottom:118px;left:90px;display:flex;align-items:center;gap:20px}
.tagline .dot{width:12px;height:12px;border-radius:50%;background:#E5ACBF;box-shadow:0 0 0 6px rgba(229,172,191,.28)}
.tagline .txt{font-family:'Instrument Serif',serif;font-style:italic;font-size:38px;color:#2A2320}
.swipe{position:absolute;bottom:56px;left:90px;font-size:20px;letter-spacing:3px;text-transform:uppercase;color:#8a7d73;font-weight:600}
.swipe span{color:#C77E97;font-size:24px;margin-left:6px}
.pgno{position:absolute;top:72px;right:60px;font-family:'Instrument Serif',serif;font-size:40px;color:#F6F5F0;mix-blend-mode:difference}
</style></head><body>
<div class="s">
 <div class="photo"></div>
 <div class="ov"></div>
 <div class="blush"></div>
 <img class="logo" src="/uploads/30x-logo.png" alt="30X">
 <div class="kicker"><span class="rule"></span>CIO · Ex-Microsoft · <b>Sensei de IA</b> · Board member</div>
 <div class="title">La IA no<br>te reemplaza.<em>Te delega.</em></div>
 <div class="sub">Cinco decisiones que separan a quien <b>usa</b> la inteligencia artificial de quien la <b>dirige</b>.</div>
 <div class="tagline"><span class="dot"></span><span class="txt">Con Cinthya Sánchez</span></div>
 <div class="swipe">Desliza<span>&rarr;</span></div>
 <div class="pgno">01</div>
</div></body></html>
