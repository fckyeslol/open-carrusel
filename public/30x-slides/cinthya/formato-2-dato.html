<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#F6F5F0;font-family:'Inter',sans-serif;color:#2A2320}
/* Profundidad: glow blush arriba-derecha + figura de gradiente sangrando abajo-izq */
.glow{position:absolute;top:-160px;right:-160px;width:760px;height:760px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%, rgba(229,172,191,.55), rgba(229,172,191,0) 66%)}
/* Glow blush inferior-izquierdo (paleta Cinthya; nada de verde 30x-master). */
.blob{position:absolute;bottom:-240px;left:-220px;width:660px;height:660px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%, rgba(199,126,151,.30), rgba(199,126,151,0) 64%)}
.logo{position:absolute;top:66px;left:70px;height:40px;width:auto}
.idx{position:absolute;top:74px;right:74px;font-family:'Instrument Serif',serif;font-size:38px;color:#C77E97}
.kicker{position:absolute;top:170px;left:72px;font-size:24px;font-weight:800;letter-spacing:5px;text-transform:uppercase;color:#C77E97;display:flex;align-items:center;gap:18px}
.kicker::before{content:'';width:52px;height:3px;background:#E5ACBF;display:inline-block}
.lead{position:absolute;top:240px;left:70px;right:150px;font-family:'Instrument Serif',serif;font-size:60px;line-height:1.05;color:#2A2320}
.num{position:absolute;top:400px;left:52px;font-family:'Instrument Serif',serif;font-size:520px;line-height:.8;color:#2A2320;letter-spacing:-8px}
.num .pct{color:#E5ACBF;font-size:300px;vertical-align:baseline}
.bar{position:absolute;top:905px;left:74px;width:380px;height:14px;border-radius:7px;background:#E5ACBF}
.body{position:absolute;top:965px;left:72px;right:150px;font-size:34px;line-height:1.4;font-weight:500;color:#3a322e}
.body b{font-weight:800;color:#2A2320}
.src{position:absolute;bottom:150px;left:74px;right:120px;font-size:23px;font-weight:600;color:#8a7d76;display:flex;align-items:center;gap:16px}
.src::before{content:'';width:40px;height:2px;background:#C77E97;display:inline-block}
.sign{position:absolute;bottom:78px;left:72px;font-family:'Instrument Serif',serif;font-style:italic;font-size:36px;color:#2A2320}
</style></head><body>
<div class="s">
  <div class="glow"></div>
  <div class="blob"></div>
  <img class="logo" src="/uploads/brand/30x-negro.png" alt="30X">
  <div class="idx">02</div>
  <div class="kicker">El dato que nadie mira</div>
  <div class="lead">De cada hora de trabajo directivo,<br>esto ya lo hace un agente:</div>
  <div class="num">40<span class="pct">%</span></div>
  <div class="bar"></div>
  <div class="body">No se trata de despedir personas. Se trata de <b>liberar criterio</b> para las decisiones que sí necesitan un humano al mando.</div>
  <div class="src">McKinsey, Estado de la IA · lectura de Cinthya Sánchez</div>
  <div class="sign">/ Cinthya Sánchez.</div>
</div>
</body></html>
