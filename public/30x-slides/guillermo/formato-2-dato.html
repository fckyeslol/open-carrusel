<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600;1,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#F6F5F0;font-family:'Open Sans',sans-serif;color:#242424}
/* Profundidad "doer": glow amarillo arriba-derecha + bloque amarillo firma sangrando abajo-izq */
.glow{position:absolute;top:-180px;right:-160px;width:720px;height:720px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%, rgba(255,212,0,.42), rgba(255,212,0,0) 66%)}
.block{position:absolute;left:-140px;bottom:-140px;width:300px;height:300px;background:#FFD400;transform:rotate(45deg);opacity:.92}
.logo{position:absolute;top:64px;left:70px;height:40px;width:auto}
.idx{position:absolute;top:66px;right:74px;font-size:34px;font-weight:800;color:#242424}
.kicker{position:absolute;top:168px;left:72px;font-size:23px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:#242424;display:flex;align-items:center;gap:16px}
.kicker::before{content:'';width:54px;height:8px;background:#FFD400;display:inline-block}
.lead{position:absolute;top:236px;left:70px;right:150px;font-size:52px;font-weight:800;line-height:1.06;letter-spacing:-1px;color:#242424}
.num{position:absolute;top:392px;left:52px;font-size:440px;font-weight:800;line-height:.82;color:#242424;letter-spacing:-14px}
.num .pct{color:#242424;font-size:260px}
.bar{position:absolute;top:892px;left:74px;width:400px;height:12px;background:#242424}
.body{position:absolute;top:952px;left:72px;right:120px;font-size:34px;line-height:1.42;font-weight:500;color:#3a3a3a}
.body b{font-weight:800;color:#242424}
.src{position:absolute;bottom:148px;left:74px;right:120px;font-size:22px;font-weight:700;color:#8f8f8c;display:flex;align-items:center;gap:16px}
.src::before{content:'';width:40px;height:3px;background:#242424;display:inline-block}
.sign{position:absolute;bottom:76px;left:72px;font-size:34px;font-weight:800;font-style:italic;color:#242424}
</style></head><body>
<div class="s">
  <div class="glow"></div>
  <div class="block"></div>
  <img class="logo" src="/uploads/brand/30x-negro.png" alt="30X">
  <div class="idx">02</div>
  <div class="kicker">El dato incómodo</div>
  <div class="lead">De cada 10 transformaciones<br>digitales que arrancan:</div>
  <div class="num">7<span class="pct">/10</span></div>
  <div class="bar"></div>
  <div class="body">No fracasan por la tecnología. Fracasan por <b>miedo a ejecutar</b> antes de sentirse listas. La velocidad de decisión es la nueva ventaja.</div>
  <div class="src">McKinsey · Digital Transformation · lectura de Guillermo Jaramillo</div>
  <div class="sign">/ Guillermo Jaramillo.</div>
</div>
</body></html>
