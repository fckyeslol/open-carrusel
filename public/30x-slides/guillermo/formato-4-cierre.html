<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600;1,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#F6F5F0;font-family:'Open Sans',sans-serif;color:#242424}
.glow{position:absolute;bottom:-280px;left:50%;transform:translateX(-50%);width:1040px;height:760px;
  background:radial-gradient(circle at 50% 100%, rgba(255,212,0,.55), rgba(255,212,0,0) 68%)}
.logo{position:absolute;top:64px;left:70px;height:40px;width:auto}
.idx{position:absolute;top:66px;right:74px;font-size:34px;font-weight:800;color:#242424}
.medallion{position:absolute;top:150px;left:50%;transform:translateX(-50%);width:246px;height:246px;border-radius:50%;overflow:hidden;border:6px solid #FFD400;box-shadow:0 22px 54px rgba(36,36,36,.26)}
.medallion img{width:100%;height:100%;object-fit:cover;object-position:33% 45%;background:#242424}
.kicker{position:absolute;top:436px;left:0;right:0;text-align:center;font-size:23px;font-weight:800;letter-spacing:5px;text-transform:uppercase;color:#242424}
.kicker span{background:#FFD400;padding:6px 16px;border-radius:4px}
.remate{position:absolute;top:506px;left:80px;right:80px;text-align:center;font-size:74px;font-weight:800;line-height:1.08;letter-spacing:-1px;color:#242424}
.remate .em{position:relative;white-space:nowrap}
.remate .em::after{content:'';position:absolute;left:-4px;right:-4px;bottom:6px;height:22px;background:#FFD400;z-index:-1}
.cta{position:absolute;top:842px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:14px;
  background:#242424;color:#F6F5F0;font-size:29px;font-weight:800;padding:24px 50px;border-radius:60px;white-space:nowrap}
.cta .arrow{color:#FFD400}
.sign{position:absolute;bottom:150px;left:0;right:0;text-align:center;font-size:34px;font-weight:800;letter-spacing:1px;color:#242424}
.sign b{color:#242424}
.handle{position:absolute;bottom:98px;left:0;right:0;text-align:center;font-size:23px;font-weight:600;letter-spacing:1px;color:#8f8f8c}
</style></head><body>
<div class="s">
  <div class="glow"></div>
  <img class="logo" src="/uploads/brand/30x-negro.png" alt="30X">
  <div class="idx">04</div>
  <div class="medallion"><img src="/uploads/30x/guillermo/face.jpg" alt=""></div>
  <div class="kicker"><span>Tu próximo movimiento</span></div>
  <div class="remate">No esperes el<br>momento perfecto.<br><span class="em">Créalo.</span></div>
  <div class="cta">Seguí a Guillermo y guardá esto <span class="arrow">→</span></div>
  <div class="sign">30X&nbsp;&nbsp;/&nbsp;&nbsp;GUILLERMO JARAMILLO</div>
  <div class="handle">30X · Executive Education</div>
</div>
</body></html>
