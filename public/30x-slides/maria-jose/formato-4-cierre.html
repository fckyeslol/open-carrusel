<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#F6F5F0;font-family:'Poppins',sans-serif;color:#5A4633}
.glow{position:absolute;bottom:-280px;left:50%;transform:translateX(-50%);width:1040px;height:760px;
  background:radial-gradient(circle at 50% 100%, rgba(240,239,159,.8), rgba(240,239,159,0) 68%)}
.blob{position:absolute;top:-160px;left:-180px;width:560px;height:560px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%, rgba(217,203,178,.5), rgba(217,203,178,0) 64%)}
.logo{position:absolute;top:66px;left:70px;height:40px;width:auto}
.idx{position:absolute;top:70px;right:74px;font-size:38px;font-weight:600;color:#5A4633;opacity:.55}
.medallion{position:absolute;top:150px;left:50%;transform:translateX(-50%);width:250px;height:250px;border-radius:50%;overflow:hidden;border:6px solid #F0EF9F;box-shadow:0 22px 55px rgba(90,70,51,.24)}
.medallion img{width:100%;height:100%;object-fit:cover;object-position:50% 32%;background:#e7ddd9}
.kicker{position:absolute;top:445px;left:0;right:0;text-align:center;font-size:23px;font-weight:800;letter-spacing:5px;text-transform:uppercase;color:#5A4633}
.remate{position:absolute;top:498px;left:80px;right:80px;text-align:center;font-weight:700;font-size:70px;line-height:1.12;letter-spacing:-1px;color:#5A4633}
.remate .hl{background:linear-gradient(180deg,transparent 58%,#F0EF9F 58%);padding:0 8px;border-radius:4px}
.cta{position:absolute;top:860px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:14px;
  background:#5A4633;color:#F6F5F0;font-size:29px;font-weight:700;padding:24px 52px;border-radius:60px;white-space:nowrap;box-shadow:0 18px 44px rgba(90,70,51,.28)}
.cta .arrow{color:#F0EF9F}
.sign{position:absolute;bottom:150px;left:0;right:0;text-align:center;font-size:46px;font-weight:600;color:#5A4633}
.handle{position:absolute;bottom:98px;left:0;right:0;text-align:center;font-size:24px;font-weight:600;letter-spacing:1px;color:#a2917c}
</style></head><body>
<div class="s">
  <div class="glow"></div>
  <div class="blob"></div>
  <img class="logo" src="/uploads/brand/30x-negro.png" alt="30X">
  <div class="idx">04</div>
  <div class="medallion"><img src="/uploads/30x/maria-jose/face.jpg" alt=""></div>
  <div class="kicker">Tu próximo movimiento</div>
  <div class="remate">No colecciones contactos.<br>Construí <span class="hl">amistades</span><br>que construyan con vos.</div>
  <div class="cta">Seguí a María José y guardá esto <span class="arrow">→</span></div>
  <div class="sign">/ María José Echeverri.</div>
  <div class="handle">30X · Executive Education</div>
</div>
</body></html>
