<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#5A4633;font-family:'Poppins',sans-serif}
/* Foto a sangre; ella queda arriba-centro, el texto vive en la banda café inferior. */
.photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 4%;background:#5A4633}
/* Wash de identidad María José: café cálido que sube desde abajo + glow amarillo pastel arriba-derecha + vignette superior para el logo. */
.wash{position:absolute;inset:0;background:
  radial-gradient(60% 42% at 84% 12%, rgba(240,239,159,.30), rgba(240,239,159,0) 60%),
  linear-gradient(0deg, rgba(56,43,29,.98) 30%, rgba(64,50,34,.86) 46%, rgba(74,58,40,.42) 60%, rgba(74,58,40,0) 74%),
  linear-gradient(180deg, rgba(56,43,29,.55) 0%, rgba(56,43,29,0) 18%)}
.grain{position:absolute;inset:0;opacity:.05;background-image:radial-gradient(#F6F5F0 1px,transparent 1px);background-size:4px 4px;mix-blend-mode:overlay}
.logo{position:absolute;top:64px;left:64px;height:44px;width:auto;filter:brightness(0) invert(1)}
.idx{position:absolute;top:70px;right:70px;font-size:38px;font-weight:600;color:#F6F5F0;opacity:.85}
.kicker{position:absolute;left:70px;right:120px;top:712px;font-size:23px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#F0EF9F;display:flex;align-items:center;gap:18px}
.kicker::before{content:'';width:52px;height:3px;background:#F0EF9F;display:inline-block;flex:none}
.title{position:absolute;left:66px;right:60px;top:766px;font-weight:800;font-size:78px;line-height:1.02;letter-spacing:-2px;color:#F6F5F0;text-shadow:0 6px 40px rgba(0,0,0,.45)}
.title .em{color:#F0EF9F}
.sub{position:absolute;left:70px;right:110px;top:1076px;font-size:29px;font-weight:500;line-height:1.4;color:#EDE7DC}
.sub b{font-weight:700;color:#F6F5F0}
.foot{position:absolute;left:70px;bottom:88px;display:flex;align-items:center;gap:18px}
.foot .dot{width:14px;height:14px;border-radius:50%;background:#F0EF9F;flex:none}
.sign{font-size:34px;font-weight:600;color:#F6F5F0}
.swipe{position:absolute;right:70px;bottom:92px;font-size:22px;font-weight:700;letter-spacing:3px;color:#F0EF9F;text-transform:uppercase}
</style></head><body>
<div class="s">
  <img class="photo" src="/uploads/30x/maria-jose/hero.jpg" alt="">
  <div class="wash"></div>
  <div class="grain"></div>
  <img class="logo" src="/uploads/brand/30x-blanco.png" alt="30X">
  <div class="idx">01</div>
  <div class="kicker">Founder ColombiaTech Week</div>
  <div class="title">El networking real<br>no se transacciona.<br><span class="em">Se construye.</span></div>
  <div class="sub">Tres verdades sobre levantar comunidad tech en LATAM — y por qué las <b>amistades</b> importan más que los contactos.</div>
  <div class="foot"><span class="dot"></span><span class="sign">Con María José Echeverri</span></div>
  <div class="swipe">Desliza →</div>
</div>
</body></html>
