<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,600;1,800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#000;font-family:'Nunito Sans',sans-serif}
/* Textura de foto muy tenue detrás + wash negro + glow violeta central */
.tex{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 8%;opacity:.2;filter:grayscale(.15)}
.wash{position:absolute;inset:0;background:
  radial-gradient(58% 44% at 50% 38%, rgba(129,119,254,.34), rgba(129,119,254,0) 62%),
  linear-gradient(180deg, rgba(0,0,0,.82), rgba(0,0,0,.68) 45%, rgba(0,0,0,.95))}
.logo{position:absolute;top:66px;left:70px;height:40px;width:auto;filter:brightness(0) invert(1)}
.idx{position:absolute;top:66px;right:74px;font-size:38px;font-weight:900;color:#9E96FF;letter-spacing:1px}
.mark{position:absolute;top:196px;left:0;right:0;text-align:center;font-weight:900;font-size:300px;line-height:.6;color:#8177FE;opacity:.92}
.quote{position:absolute;top:498px;left:92px;right:92px;text-align:center;font-weight:800;font-size:78px;line-height:1.14;letter-spacing:-1px;color:#F6F5F0}
.quote .em{font-style:italic;font-weight:800;color:#9E96FF}
.divider{position:absolute;top:970px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:20px}
.divider .line{width:120px;height:2px;background:rgba(246,245,240,.32)}
.divider .dot{width:12px;height:12px;transform:rotate(45deg);background:#8177FE;box-shadow:0 0 16px rgba(129,119,254,.9)}
.name{position:absolute;top:1052px;left:0;right:0;text-align:center;font-size:32px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#F6F5F0}
.role{position:absolute;top:1110px;left:0;right:0;text-align:center;font-size:24px;font-weight:600;color:#C0C7D0}
</style></head><body>
<div class="s">
  <img class="tex" src="/uploads/30x/liz/hero.jpg" alt="">
  <div class="wash"></div>
  <img class="logo" src="/uploads/brand/30x-blanco.png" alt="30X">
  <div class="idx">03</div>
  <div class="mark">&ldquo;</div>
  <div class="quote">La IA no reemplaza tu talento.<br>Amplifica <span class="em">tu criterio.</span></div>
  <div class="divider"><span class="line"></span><span class="dot"></span><span class="line"></span></div>
  <div class="name">Liz Hernández</div>
  <div class="role">Founder @Morelatam · AI Summit LatAm</div>
</div>
</body></html>
