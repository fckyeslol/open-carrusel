<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,600;1,800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#F6F5F0;font-family:'Nunito Sans',sans-serif;color:#000}
.glow{position:absolute;bottom:-260px;left:50%;transform:translateX(-50%);width:1000px;height:740px;
  background:radial-gradient(circle at 50% 100%, rgba(129,119,254,.5), rgba(129,119,254,0) 68%)}
.logo{position:absolute;top:66px;left:70px;height:40px;width:auto}
.idx{position:absolute;top:68px;right:74px;font-size:38px;font-weight:900;color:#6B5FEA;letter-spacing:1px}
.medallion{position:absolute;top:150px;left:50%;transform:translateX(-50%);width:240px;height:240px;border-radius:50%;overflow:hidden;border:5px solid #8177FE;box-shadow:0 20px 54px rgba(129,119,254,.34)}
.medallion img{width:100%;height:100%;object-fit:cover;object-position:52% 42%;background:#dfe1e6}
.kicker{position:absolute;top:432px;left:0;right:0;text-align:center;font-size:23px;font-weight:900;letter-spacing:4px;text-transform:uppercase;color:#6B5FEA}
.remate{position:absolute;top:488px;left:80px;right:80px;text-align:center;font-weight:800;font-size:72px;line-height:1.08;letter-spacing:-1px;color:#000}
.remate .em{font-style:italic;font-weight:800;color:#6B5FEA}
.cta{position:absolute;top:838px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:14px;
  background:#000;color:#F6F5F0;font-size:30px;font-weight:800;padding:24px 52px;border-radius:60px;white-space:nowrap}
.cta .arrow{color:#9E96FF}
.sign{position:absolute;bottom:150px;left:0;right:0;text-align:center;font-size:46px;font-weight:900;letter-spacing:-1px;color:#000}
.handle{position:absolute;bottom:96px;left:0;right:0;text-align:center;font-size:24px;font-weight:700;letter-spacing:1px;color:#6c6c78}
</style></head><body>
<div class="s">
  <div class="glow"></div>
  <img class="logo" src="/uploads/brand/30x-negro.png" alt="30X">
  <div class="idx">04</div>
  <div class="medallion"><img src="/uploads/30x/liz/face.jpg" alt=""></div>
  <div class="kicker">Tu próximo movimiento</div>
  <div class="remate">No preguntes si la IA<br>llegó a LatAm.<br><span class="em">Preguntá qué vas a construir.</span></div>
  <div class="cta">Seguí a Liz y guardá esto <span class="arrow">→</span></div>
  <div class="sign">Liz Hernández.</div>
  <div class="handle">30X · Executive Education</div>
</div>
</body></html>
