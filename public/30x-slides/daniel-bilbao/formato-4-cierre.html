<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#F6F5F0;font-family:'Arimo',Arial,sans-serif;color:#0C1030}
.glow{position:absolute;bottom:-260px;left:50%;transform:translateX(-50%);width:1000px;height:720px;
  background:radial-gradient(circle at 50% 100%, rgba(58,52,224,.34), rgba(58,52,224,0) 68%)}
.logo{position:absolute;top:66px;left:70px;height:40px;width:auto}
.idx{position:absolute;top:70px;right:74px;font-size:34px;font-weight:700;letter-spacing:2px;color:#3A34E0}
.medallion{position:absolute;top:150px;left:50%;transform:translateX(-50%);width:240px;height:240px;border-radius:50%;overflow:hidden;border:5px solid #3A34E0;box-shadow:0 20px 50px rgba(12,16,48,.28)}
.medallion img{width:100%;height:100%;object-fit:cover;object-position:50% 30%;background:#0C1030}
.kicker{position:absolute;top:430px;left:0;right:0;text-align:center;font-size:23px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:#3A34E0}
.remate{position:absolute;top:486px;left:80px;right:80px;text-align:center;font-weight:700;font-size:72px;line-height:1.08;letter-spacing:-2px;color:#0C1030}
.remate .em{color:#3A34E0}
.cta{position:absolute;top:840px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:14px;
  background:#0C1030;color:#F6F5F0;font-size:29px;font-weight:700;padding:24px 50px;border-radius:60px;white-space:nowrap;box-shadow:0 18px 44px rgba(12,16,48,.26)}
.cta .arrow{color:#8A93FF}
.sign{position:absolute;bottom:152px;left:0;right:0;text-align:center;font-size:46px;font-weight:700;letter-spacing:-1px;color:#0C1030}
.handle{position:absolute;bottom:96px;left:0;right:0;text-align:center;font-size:24px;font-weight:600;letter-spacing:1px;color:#6b7180}
</style></head><body>
<div class="s">
  <div class="glow"></div>
  <img class="logo" src="/uploads/brand/30x-negro.png" alt="30X">
  <div class="idx">04</div>
  <div class="medallion"><img src="/uploads/30x/daniel-bilbao/face.jpg" alt=""></div>
  <div class="kicker">Tu próxima contratación</div>
  <div class="remate">No busques al más listo.<br>Buscá al que <span class="em">no se rinde.</span></div>
  <div class="cta">Seguí a Daniel y guardá esto <span class="arrow">→</span></div>
  <div class="sign">Daniel Bilbao.</div>
  <div class="handle">30X · Executive Education</div>
</div>
</body></html>
