<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#F6F5F0;font-family:'Arimo',Arial,sans-serif;color:#0C1030}
/* Profundidad: glow azul eléctrico arriba-derecha + halo acero abajo-izquierda */
.glow{position:absolute;top:-170px;right:-160px;width:760px;height:760px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%, rgba(58,52,224,.24), rgba(58,52,224,0) 66%)}
.blob{position:absolute;bottom:-240px;left:-220px;width:660px;height:660px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%, rgba(192,199,208,.55), rgba(192,199,208,0) 64%)}
.logo{position:absolute;top:66px;left:70px;height:40px;width:auto}
.idx{position:absolute;top:70px;right:74px;font-size:34px;font-weight:700;letter-spacing:2px;color:#3A34E0}
.kicker{position:absolute;top:172px;left:72px;font-size:24px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:#3A34E0;display:flex;align-items:center;gap:18px}
.kicker::before{content:'';width:52px;height:3px;background:#3A34E0;display:inline-block}
.lead{position:absolute;top:238px;left:70px;right:150px;font-size:44px;font-weight:600;line-height:1.16;color:#0C1030}
.num{position:absolute;top:398px;left:60px;font-weight:700;font-size:400px;line-height:.82;color:#0C1030;letter-spacing:-14px}
.num .pct{color:#3A34E0;font-size:250px;letter-spacing:-6px}
.bar{position:absolute;top:900px;left:74px;width:360px;height:14px;border-radius:7px;background:#3A34E0}
.body{position:absolute;top:958px;left:72px;right:150px;font-size:34px;line-height:1.4;font-weight:500;color:#2b2f4a}
.body b{font-weight:700;color:#0C1030}
.src{position:absolute;bottom:150px;left:74px;right:120px;font-size:23px;font-weight:600;color:#6b7180;display:flex;align-items:center;gap:16px}
.src::before{content:'';width:40px;height:2px;background:#3A34E0;display:inline-block;flex:none}
.sign{position:absolute;bottom:78px;left:72px;font-size:32px;font-weight:600;color:#0C1030}
</style></head><body>
<div class="s">
  <div class="glow"></div>
  <div class="blob"></div>
  <img class="logo" src="/uploads/brand/30x-negro.png" alt="30X">
  <div class="idx">02</div>
  <div class="kicker">El dato incómodo</div>
  <div class="lead">De las contrataciones que fracasan en el primer año,<br>fracasan por esto:</div>
  <div class="num">89<span class="pct">%</span></div>
  <div class="bar"></div>
  <div class="body">No por falta de skills técnicos. Por <b>actitud</b>: no reciben feedback, les falta hambre, no encajan con la misión.</div>
  <div class="src">Leadership IQ · 20.000 contrataciones · lectura de Daniel Bilbao</div>
  <div class="sign">/ Daniel Bilbao.</div>
</div>
</body></html>
