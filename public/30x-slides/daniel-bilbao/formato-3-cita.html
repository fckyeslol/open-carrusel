<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.s{width:1080px;height:1350px;position:relative;overflow:hidden;background:#0C1030;font-family:'Arimo',Arial,sans-serif}
/* Textura de foto muy tenue detrás + wash navy + glow azul eléctrico central */
.tex{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 14%;opacity:.16;filter:grayscale(.35)}
.wash{position:absolute;inset:0;background:
  radial-gradient(58% 44% at 50% 40%, rgba(58,52,224,.30), rgba(58,52,224,0) 62%),
  linear-gradient(180deg, rgba(12,16,48,.86), rgba(12,16,48,.70) 45%, rgba(12,16,48,.95))}
.grain{position:absolute;inset:0;opacity:.05;background-image:radial-gradient(#C0C7D0 1px,transparent 1px);background-size:4px 4px;mix-blend-mode:overlay}
.logo{position:absolute;top:66px;left:70px;height:40px;width:auto}
.idx{position:absolute;top:70px;right:74px;font-size:34px;font-weight:700;letter-spacing:2px;color:#8A93FF}
.mark{position:absolute;top:236px;left:0;right:0;text-align:center;font-family:Georgia,'Times New Roman',serif;font-size:300px;line-height:.5;color:#3A34E0;opacity:.85}
.quote{position:absolute;top:494px;left:90px;right:90px;text-align:center;font-weight:700;font-size:76px;line-height:1.14;letter-spacing:-2px;color:#F6F5F0}
.quote .em{color:#8A93FF}
.divider{position:absolute;top:966px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:20px}
.divider .line{width:120px;height:2px;background:rgba(246,245,240,.32)}
.divider .dot{width:12px;height:12px;transform:rotate(45deg);background:#3A34E0}
.name{position:absolute;top:1052px;left:0;right:0;text-align:center;font-size:32px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#F6F5F0}
.role{position:absolute;top:1110px;left:0;right:0;text-align:center;font-size:24px;font-weight:500;color:#C0C7D0}
</style></head><body>
<div class="s">
  <img class="tex" src="/uploads/30x/daniel-bilbao/hero.jpg" alt="">
  <div class="wash"></div>
  <div class="grain"></div>
  <img class="logo" src="/uploads/brand/30x-blanco.png" alt="30X">
  <div class="idx">03</div>
  <div class="mark">&ldquo;</div>
  <div class="quote">No contrates por el CV.<br>Contratá por la <span class="em">obsesión.</span></div>
  <div class="divider"><span class="line"></span><span class="dot"></span><span class="line"></span></div>
  <div class="name">Daniel Bilbao</div>
  <div class="role">CEO @Truora · Ecosistema Tech LatAm</div>
</div>
</body></html>
